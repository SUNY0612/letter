<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>대신 전해드립니다!</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="landing">
  <nav class="navbar">
    <div class="logo">대신 전해드립니다</div>
    <ul class="menu">
  
    </ul>
  </nav>

  <main class="hero">
    <section class="hero-copy">
      <p class="eyebrow">Personal Letter Builder</p>
      <h1>마음을 정리하고 편지로 완성하세요</h1>
      <p>설문으로 문장을 모으고, 편지지 꾸미기에서 분위기에 맞는 디자인을 골라 바로 확인할 수 있습니다.</p>
      <div class="hero-actions">
        <button id="start-btn" class="primary-btn">설문 시작</button>
      </div>
    </section>

    <aside class="hero-paper" aria-label="편지 미리보기 장식">
      <div class="paper-pin"></div>
      <p>Dear friend,</p>
      <strong>오늘 전하고 싶은 말</strong>
      <span>고마운 마음을 차분하게 적어 내려가는 편지 공간</span>
    </aside>
</main>

  <footer>
    <p>© 대신 전해드립니다!</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
