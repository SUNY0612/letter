<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>설문조사</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <div class="logo">대신 전해드립니다</div>
    <ul class="menu">
      <li><a href="index.html">홈으로</a></li>
      <li><a href="decorate.html">편지지 꾸미기</a></li>
    </ul>
  </nav>

  <header class="page-header">
    <p class="eyebrow">Survey</p>
    <h1>마음 설문</h1>
    <p>한 문항씩 넘기면서 편지에 담을 마음을 정리해보세요.</p>
  </header>

  <main class="survey-layout">
    <section class="survey-panel" aria-label="마음 설문">
      <div class="survey-progress">
        <span id="progress-text">1 / 5</span>
        <div class="progress-track" aria-hidden="true">
          <span id="progress-bar"></span>
        </div>
      </div>

      <div id="card-container" class="survey-slider" aria-live="polite"></div>

      <div class="survey-actions">
        <button id="prev-btn" class="secondary-btn" type="button">이전</button>
        <button id="next-btn" class="primary-btn" type="button">다음</button>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
